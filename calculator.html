<!DOCTYPE html>
<html>

<head>
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css"> 
</head>

<body>
  <header class="sc-header">
    <div>
      <ul class="nav-categories">
        <li>
          <a class="menu-tab logo" href="main.html">
            Бекапы
          </a>
        </li>
        <li>
          <a class="menu-tab" href="calculator.html">
            Калькулятор
          </a>
        </li>
        <li>
          <a class="menu-tab" href="author.html">
            Автор
          </a>
        </li>
      </ul>
    </div>
  </header>
  <div class="main-container"> <!-- div - это базовый html-контейнер, который может содержать в себе другие html-элементы. -->
    <div class="background-on">
    <!-- блок с экраном калькулятора, где будет выводиться результат вычислений. -->
    <div id="result-window" class="result">
      <div id="result">0</div>
      <div id="history" class="history"></div>
    </div>

    <!-- блок с кнопками калькулятора. -->
    <div>
      <!--горизонтальный ряд из четырех кнопок-->
      <div>  
        <button id="btn_op_clear" class="my-btn secondary">C</button>    <!-- про тэг кнопки: https://www.w3schools.com/tags/tag_button.asp -->
        <button id="btn_op_sign" class="my-btn secondary">+/-</button>
        <button id="btn_op_percent" class="my-btn secondary">%</button>
        <button id="btn_op_div" class="my-btn primary">/</button>
        <button id="btn_delete" class="my-btn primary long">⌫</button>
      </div>

      <div>
       <button id="btn_digit_7" class="my-btn">7</button>
        <button id="btn_digit_8" class="my-btn">8</button>
        <button id="btn_digit_9" class="my-btn">9</button>
        <button id="btn_op_mult" class="my-btn primary">×</button>
        <button id="btn_op_sqrt" class="my-btn primary">√</button>
        <button id="btn_op_square" class="my-btn primary">x²</button>
      </div>

      <div>
        <button id="btn_digit_4" class="my-btn">4</button>
        <button id="btn_digit_5" class="my-btn">5</button>
        <button id="btn_digit_6" class="my-btn">6</button>
        <button id="btn_op_minus" class="my-btn primary">-</button>
        <button id="btn_op_factorial" class="my-btn primary">x!</button>
        <button id="btn_three_zeroes" class="my-btn primary">000</button>
      </div>

      <div>
        <button id="btn_digit_1" class="my-btn">1</button>
        <button id="btn_digit_2" class="my-btn">2</button>
        <button id="btn_digit_3" class="my-btn">3</button>
        <button id="btn_op_plus" class="my-btn primary">+</button>
        <button id="btn_grand_total" class="my-btn primary">GT</button>
        <button id="btn_exp" class="my-btn primary">eˣ</button>
      </div>

      <div>
        <button id="btn_digit_0" class="my-btn">0</button>
        <button id="btn_digit_dot" class="my-btn">.</button>
        <button id="btn_op_equal" class="my-btn primary long">=</button>
        <button id="btn_memory_plus" class="my-btn primary">M+</button>
        <button id="btn_memory_minus" class="my-btn primary">M-</button>
      </div>
    </div>
    </div>
  </div>
  <script type="text/javascript" src="calc.js"></script>
</body>
</html>
